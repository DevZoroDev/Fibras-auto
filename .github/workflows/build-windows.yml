name: Build Windows portable

# Genera un .exe portable de Windows (todo embebido, incluido Tesseract OCR).
# Se ejecuta:
#   - Al pulsar "Run workflow" desde la pestaña Actions de GitHub.
#   - Automáticamente en cada push a main que toque el código de la app.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'fibra_app/**'
      - 'run.py'
      - 'requirements.txt'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # ---------------------------------------------------------------
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      # ---------------------------------------------------------------
      # Tesseract OCR portable: usar el binario ya instalado en el runner.
      # Instala Tesseract con Chocolatey y arma una carpeta portable propia
      # (tesseract.exe + DLLs + idiomas spa/eng/osd descargados explícitamente).
      # Se usan rutas absolutas porque el PATH no se refresca tras choco install.
      - name: Preparar Tesseract portable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Instalando Tesseract con Chocolatey..."
          choco install tesseract -y --no-progress

          $tessRoot = "C:\Program Files\Tesseract-OCR"
          if (-not (Test-Path "$tessRoot\tesseract.exe")) {
            Write-Error "No se encontró tesseract.exe en $tessRoot tras la instalación."
            exit 1
          }

          # Carpeta portable local que se empaquetará dentro del .exe
          $dst = Join-Path $PWD "tesseract"
          New-Item -ItemType Directory -Force -Path "$dst\tessdata" | Out-Null
          Copy-Item "$tessRoot\*.exe" $dst -Force
          Copy-Item "$tessRoot\*.dll" $dst -Force -ErrorAction SilentlyContinue

          # Descargar idiomas necesarios desde el repo oficial (estándar).
          $base = "https://github.com/tesseract-ocr/tessdata/raw/main"
          foreach ($l in @('spa','eng','osd')) {
            Write-Host "Descargando $l.traineddata..."
            Invoke-WebRequest -Uri "$base/$l.traineddata" `
              -OutFile "$dst\tessdata\$l.traineddata"
          }

          # Verificar que el binario portable reconoce el español.
          $langs = & "$dst\tesseract.exe" --tessdata-dir "$dst\tessdata" --list-langs 2>&1
          Write-Host "Idiomas disponibles:"
          Write-Host $langs
          if (-not ($langs -match 'spa')) {
            Write-Error "El Tesseract portable no reconoce el idioma 'spa'."
            exit 1
          }
          Write-Host "Tesseract portable listo en: $dst"
          Get-ChildItem $dst -Recurse | Select-Object FullName, Length

      # ---------------------------------------------------------------
      - name: Instalar dependencias Python
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------------------------------------------
      - name: Empaquetar con PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --name "SolicitudesFibra" `
            --collect-data customtkinter `
            --collect-submodules google `
            --add-data "tesseract;tesseract" `
            --add-data "ejecutivos.json;." `
            --add-data ".env.example;." `
            run.py

      # ---------------------------------------------------------------
      - name: Copiar archivos de configuración junto al .exe
        shell: pwsh
        run: |
          $dest = "dist\SolicitudesFibra"
          # ejecutivos.json: si no lo tomó PyInstaller, copiar al lado del exe
          if (Test-Path "ejecutivos.json") {
            Copy-Item "ejecutivos.json" $dest -Force
          }
          # Crear un .env de plantilla (sin secretos) para que el usuario edite
          if (Test-Path ".env.example") {
            Copy-Item ".env.example" "$dest\.env" -Force
          }
          # README específico de la versión portable
          Copy-Item "packaging\LEEME.txt" "$dest\LEEME.txt" -Force

      # El credentials.json (cliente OAuth de escritorio) se guarda como Secret
      # del repositorio y se inyecta aquí, para que cada usuario solo deba
      # iniciar sesión con su propio Gmail (no se incluye token.json).
      - name: Inyectar credentials.json (OAuth)
        shell: pwsh
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CREDENTIALS_JSON)) {
            Write-Error ("Falta el Secret 'CREDENTIALS_JSON' en el repositorio. " +
              "Agrégalo en Settings > Secrets and variables > Actions con el " +
              "contenido de tu credentials.json.")
            exit 1
          }
          $ruta = "dist\SolicitudesFibra\credentials.json"
          [System.IO.File]::WriteAllText($ruta, $env:CREDENTIALS_JSON)
          # Validar que sea JSON de cliente OAuth de escritorio.
          $j = Get-Content $ruta -Raw | ConvertFrom-Json
          if (-not $j.installed) {
            Write-Error "El Secret CREDENTIALS_JSON no es un cliente OAuth de 'App de escritorio' (falta la clave 'installed')."
            exit 1
          }
          Write-Host "credentials.json inyectado correctamente."

      - name: Comprimir carpeta portable en ZIP
        shell: pwsh
        run: |
          $version = "$(Get-Date -Format yyyy-MM-dd)-${{ github.run_number }}"
          $zip = "SolicitudesFibra-Windows-$version.zip"
          Compress-Archive -Path "dist\SolicitudesFibra\*" -DestinationPath $zip -CompressionLevel Optimal
          Write-Host "ZIP creado: $zip"
          "zip_name=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: zip

      # ---------------------------------------------------------------
      - name: Publicar artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: SolicitudesFibra-Windows
          path: ${{ steps.zip.outputs.zip_name }}
          retention-days: 30
          if-no-files-found: error

      - name: Resumen
        shell: pwsh
        run: |
          $size = (Get-Item "${{ steps.zip.outputs.zip_name }}").Length / 1MB
          Write-Host "Tamaño del ZIP: $([math]::Round($size,1)) MB"
          Write-Host ""
          Write-Host "Listo. Ve a la pestaña Actions de GitHub, abre esta corrida"
          Write-Host "y descarga el artefacto 'SolicitudesFibra-Windows'."
